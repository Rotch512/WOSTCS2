<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CS2 Match Detail</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup">
        <img src="./assets/teamlogo/WOST.png" alt="WOST">
        <h1>Performance Lab</h1>
      </div>
    </header>

    <main>
      <section id="matchHero" class="match-hero"></section>

      <section class="panel">
        <div class="panel-title">
          <h2>Player Detail</h2>
          <div id="matchSideTabs" class="mini-side-tabs"></div>
        </div>
        <div class="table-wrap">
          <table id="matchPlayersTable"></table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>Round Detail</h2>
          <span id="roundDetailSummary"></span>
        </div>
        <div id="matchRoundList" class="round-list"></div>
      </section>
    </main>

    <script src="./match.js"></script>
  </body>
</html>
